<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - E-Commerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Andreyan Supplies Ltd</h1>

    <!-- Cart Counter -->
    <h3>Cart (<span id="cart-count">0</span>)</h3>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search products..."  onkeyup="searchProduct()">

    <!-- Filter Buttons -->
    <div>
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Electronics')">Electronics</button>
        <button onclick="filterCategory('Fashion')">Fashion</button>
        <button onclick="filterCategory('Books')">Books</button>
    </div>

    <!-- Products Container -->
    <div id="products"></div>

    <br>
    <a href="cart.html">Go to Cart</a>

    <script src="js/script.js"></script>
</body>
</html>
